# Render Blueprint for the backend API.
# Create the service via Render → "New" → "Blueprint" and point it at this repo,
# or configure the same settings manually in the dashboard.
#
# A MongoDB is NOT provisioned here — use a free MongoDB Atlas cluster and put its
# connection string in MONGO_URI (set in the Render dashboard, never committed).
services:
  - type: web
    name: acm-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Secrets / per-environment values — set these in the Render dashboard.
      - key: MONGO_URI
        sync: false # e.g. mongodb+srv://user:pass@cluster.mongodb.net/acm
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random value
      - key: CORS_ORIGIN
        sync: false # your Vercel URL, e.g. https://your-app.vercel.app  (or * for any)
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # AI moderation: deployed with the real Groq provider.
      # GROQ_API_KEY is REQUIRED — set it in the Render dashboard (free key at console.groq.com).
      - key: MODERATION_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
