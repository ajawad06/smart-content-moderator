services:
  mongo:
    image: mongo:7
    container_name: acm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: ./backend
    container_name: acm-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/acm
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-please-32chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      MODERATION_PROVIDER: ${MODERATION_PROVIDER:-mock}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-meta-llama/llama-4-scout-17b-16e-instruct}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@acm.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: acm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mongo-data:
